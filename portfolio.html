<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Eben</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .header {
            margin-bottom: 30px;
        }

        .profile-image {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 20px;
            border: 4px solid #667eea;
            display: block;
        }

        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 16px;
            margin-bottom: 20px;
        }

        .qr-section {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 10px;
            margin: 30px 0;
        }

        .qr-section h2 {
            color: #333;
            font-size: 18px;
            margin-bottom: 20px;
        }

        #qrcode {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        #qrcode img {
            max-width: 100%;
            height: auto;
        }

        .link-section {
            margin: 30px 0;
        }

        .link-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin: 15px 0;
            text-decoration: none;
            display: inline-block;
            transition: transform 0.3s ease;
        }

        .link-box:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .link-box p {
            margin: 5px 0;
            font-size: 14px;
            opacity: 0.9;
        }

        .link-box strong {
            display: block;
            font-size: 18px;
            margin: 10px 0;
        }

        .copy-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin: 10px 0;
            transition: background 0.3s ease;
        }

        .copy-btn:hover {
            background: #764ba2;
        }

        .copy-btn:active {
            transform: scale(0.98);
        }

        .footer {
            margin-top: 30px;
            color: #999;
            font-size: 12px;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }

        .social-links a {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #667eea;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: background 0.3s ease;
        }

        .social-links a:hover {
            background: #764ba2;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 24px;
            }

            .qr-section {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="eben_photo.jpg" alt="Portfolio" class="profile-image" onerror="this.style.display='none'">
            <h1>Eben</h1>
            <p class="subtitle">Portfolio Personnel</p>
        </div>

        <div class="qr-section">
            <h2>📱 Scanner le QR Code</h2>
            <div id="qrcode"></div>
            <p style="color: #666; font-size: 14px; margin-top: 15px;">Scannez ce code pour accéder directement au portfolio</p>
        </div>

        <div class="link-section">
            <h2 style="color: #333; margin-bottom: 20px;">🔗 Lien Direct</h2>
            <div class="link-box">
                <p>Accès rapide au portfolio</p>
                <strong id="portfolioUrl">https://muko-tech.github.io/portfolio</strong>
                <button class="copy-btn" onclick="copyToClipboard()">Copier le lien</button>
            </div>
        </div>

        <div class="social-links">
            <!-- Ajoute tes liens sociaux ici -->
            <!-- <a href="#" title="GitHub">GH</a> -->
            <!-- <a href="#" title="LinkedIn">LI</a> -->
            <!-- <a href="#" title="Twitter">TW</a> -->
        </div>

        <div class="footer">
            <p>© 2026 Eben - Tous droits réservés</p>
        </div>
    </div>

    <!-- QR Code Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        // Générer le QR Code
        const portfolioUrl = 'https://muko-tech.github.io/portfolio';
        
        const qrcode = new QRCode(document.getElementById('qrcode'), {
            text: portfolioUrl,
            width: 250,
            height: 250,
            colorDark: '#667eea',
            colorLight: '#ffffff',
            correctLevel: QRCode.CorrectLevel.H
        });

        // Fonction pour copier le lien
        function copyToClipboard() {
            const url = document.getElementById('portfolioUrl').textContent;
            navigator.clipboard.writeText(url).then(() => {
                const button = event.target;
                const originalText = button.textContent;
                button.textContent = '✓ Copié !';
                button.style.background = '#4CAF50';
                
                setTimeout(() => {
                    button.textContent = originalText;
                    button.style.background = '#667eea';
                }, 2000);
            }).catch(err => {
                alert('Erreur lors de la copie: ' + err);
            });
        }

        // Optionnel: Redirection si on accède directement via le lien court
        // À mettre en place avec un service de redirection ou une configuration GitHub Pages
    </script>
</body>
</html>
